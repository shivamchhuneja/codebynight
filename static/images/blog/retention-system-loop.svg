<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 540" role="img" aria-labelledby="title desc">
<title id="title">Retention is a loop, not a one-time prediction</title>
<desc id="desc">A retention system loop connects signals, health scoring, ownership, intervention, customer outcome, and feedback.</desc>
<style>text{font-family:"Open Sans",Arial,sans-serif;font-weight:400}.title{font-size:28px;fill:#9aa0a6}.box{stroke:#1e1e1e;stroke-width:2.5;rx:16;ry:16}.label{font-size:18px;fill:#2f3437}.small{font-size:15px;fill:#9aa0a6}.note{font-size:20px;fill:#9aa0a6}</style>
<text x="525" y="45" text-anchor="middle" class="title" fill="#9aa0a6">Retention is a loop, not a one-time prediction</text>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa0a6"/></marker></defs>
<rect class="box" x="60" y="150" width="190" height="90" fill="#c3fae8"/><text class="label" x="155" y="185" text-anchor="middle"><tspan x="155">Usage, support,</tspan><tspan x="155" dy="23">CRM, billing signals</tspan></text>
<line x1="260" y1="195" x2="320" y2="195" stroke="#9aa0a6" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect class="box" x="330" y="150" width="170" height="90" fill="#d0bfff"/><text class="label" x="415" y="185" text-anchor="middle"><tspan x="415">Health score</tspan><tspan x="415" dy="23">or rules</tspan></text>
<line x1="510" y1="195" x2="570" y2="195" stroke="#9aa0a6" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect class="box" x="580" y="150" width="170" height="90" fill="#a5d8ff"/><text class="label" x="665" y="185" text-anchor="middle"><tspan x="665">Route to</tspan><tspan x="665" dy="23">right owner</tspan></text>
<line x1="760" y1="195" x2="820" y2="195" stroke="#9aa0a6" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect class="box" x="830" y="150" width="160" height="90" fill="#ffd8a8"/><text class="label" x="910" y="202" text-anchor="middle">Intervention</text>
<line x1="910" y1="250" x2="910" y2="320" stroke="#9aa0a6" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect class="box" x="830" y="330" width="160" height="90" fill="#b2f2bb"/><text class="label" x="910" y="365" text-anchor="middle"><tspan x="910">Customer</tspan><tspan x="910" dy="23">outcome</tspan></text>
<line x1="825" y1="375" x2="260" y2="375" stroke="#9aa0a6" stroke-width="2.5" marker-end="url(#arrow)"/><text class="small" x="545" y="356" text-anchor="middle">learn from result</text>
<rect class="box" x="60" y="330" width="190" height="90" fill="#fff3bf"/><text class="label" x="155" y="365" text-anchor="middle"><tspan x="155">Better signals,</tspan><tspan x="155" dy="23">better playbooks</tspan></text>
<line x1="155" y1="330" x2="155" y2="250" stroke="#9aa0a6" stroke-width="2.5" marker-end="url(#arrow)"/>
<text class="note" x="525" y="490" text-anchor="middle">The useful system notices risk, assigns ownership, acts, and learns.</text>
</svg>